spring.application.name=online-etkinlik
# Veritabanı Bağlantı Ayarları
spring.datasource.url=jdbc:mysql://localhost:3306/online_etkinlik?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA Ayarları (Tabloları otomatik oluşturması ve güncellemesi için)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true