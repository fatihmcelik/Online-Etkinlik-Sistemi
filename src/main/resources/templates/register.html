<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Online Etkinlik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>


<body class="bg-light">
    <div class="container mt-5" style="max-width: 450px;">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Yeni Hesap Oluştur</h2>
                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Ad</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Soyad</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Kullanıcı Adı</label>
                        <input type="text" th:field="*{username}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-posta</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" th:field="*{passwordHash}" class="form-control" required>

                    </div>
                    
                    <button type="submit" class="btn login-btn w-100">Kayıt Ol</button>
                </form>

                <div class="text-center mt-4">
                    <p class="register-text">
                        Zaten üye misin? <a href="login.html" class="register-link">Giriş Yap</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
