<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödeme Yöntemi Seçin</title>
    <link rel="stylesheet" href="payment.css"> 
    <style>
       
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .selection-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        
        .method-box {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }
        
        .method-card {
            flex: 1;
            padding: 25px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .method-card:hover {
            border-color: #28a745;
            background-color: #f8fff9;
            transform: translateY(-5px);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #333;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="selection-container">
    <h2>Ödeme Yöntemi Seçiniz</h2>
    <p>Lütfen devam etmek için bir yöntem belirleyin.</p>

    <div class="method-box">
        <a href="#" class="method-card" onclick="alert('Ödeme yöntemi olarak kapıda nakit ödeme seçilmiştir. Lütfen giriş yaparken ödemenizi gerçekleştiriniz.')">
            <span class="icon">💵</span>
            <strong>Kapıda Nakit Ödeme</strong>
        </a>

        <a href="credit-card.html" class="method-card">
            <span class="icon">💳</span>
            <strong>Kredi Kartı</strong>
        </a>
    </div>

    <a href="/event/event-detail.html" class="back-btn">← Önceki Sayfaya Dön</a>
</div>

</body>
</html>
