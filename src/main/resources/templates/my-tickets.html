<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biletlerim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Biletlerim</h2>
    
    <div th:if="${tickets.isEmpty()}" class="alert alert-info">
        Henüz bir biletiniz bulunmuyor.
    </div>

    <div class="row">
        <div class="col-md-6 mb-4" th:each="ticket : ${tickets}">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="card-title mb-0" th:text="${ticket.ticketType.event.title}">Etkinlik Adı</h5>
                        <span th:if="${ticket.status == 'BASARILI'}" class="badge bg-success text-white">ONAYLANDI</span>
                        <span th:if="${ticket.status == 'BEKLIYOR'}" class="badge bg-warning text-dark">ONAY BEKLIYOR (HAVALE)</span>
                    </div>
                    <p class="text-muted mb-2">
                        📍 <span th:text="${ticket.ticketType.event.location.name}">Mekan</span>
                    </p>
                    <div class="bg-light p-2 rounded text-center">
                        <span class="small text-muted d-block">Bilet Kodu (PNR)</span>
                        <strong class="h5" th:text="${ticket.ticketCode}">TKT-XXXXXX</strong>
                    </div>
                    <div class="mt-3 small">
                        Satın Alma Tarihi: <span th:text="${#temporals.format(ticket.purchaseDate, 'dd-MM-yyyy HH:mm')}">Tarih</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
