<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Etkinlik Detayı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .event-header { background: #f8f9fa; padding: 40px 0; border-bottom: 1px solid #dee2e6; }
        .speaker-card { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="event-header text-center">
        <h1 th:text="${event.title}">Etkinlik Başlığı</h1>
        <span class="badge bg-primary" th:text="${event.category.name}">Kategori</span>
    </div>

    <div class="row mt-4">
        <div class="col-md-8">
            <h3>Etkinlik Hakkında</h3>
            <p th:text="${event.description}">Burada etkinlik açıklaması yer alacak.</p>
            
            <hr>
            
            <h4>Konuşmacılar</h4>
            <div th:each="speaker : ${event.speakers}" class="speaker-card">
                <strong th:text="${speaker.firstName + ' ' + speaker.lastName}">Ad Soyad</strong>
                <p class="small text-muted" th:text="${speaker.bio}">Kısa biyografi...</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Bilgiler</h5>
                    <p><strong>📍 Mekan:</strong> <span th:text="${event.location.name}">Mekan Adı</span></p>
                    <p><strong>📅 Tarih:</strong> <span th:text="${#temporals.format(event.startDate, 'dd MMMM yyyy HH:mm')}">01 Ocak 2026</span></p>
                    <p><strong>👥 Kapasite:</strong> <span th:text="${event.location.capacity}">100</span> Kişi</p>
                    
                    <hr>
                    
                    <a th:href="@{/checkout(eventId=${event.id})}" class="btn btn-success w-100">Bilet Al / Kayıt Ol</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
