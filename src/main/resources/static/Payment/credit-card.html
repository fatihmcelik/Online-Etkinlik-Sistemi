<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödeme Formu</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

<div class="payment-container">
    <a href="index.html" class="back-link">← Geri Dön</a>

    <h2>Güvenli Ödeme</h2>
    
    <div class="card-visual">
        <div class="chip"></div>
        <div class="card-number-display">#### #### #### ####</div>
        <div class="card-holder-display">AD SOYAD</div>
        <div class="card-expiry-display">AA/YY</div>
    </div>

    <form class="payment-form">
        <div class="input-group">
            <label for="card-holder">Kart Üzerindeki İsim</label>
            <input type="text" id="card-holder" placeholder="Örn. Hamza Çetin" required>
        </div>

        <div class="input-group">
            <label for="card-number">Kart Numarası</label>
            <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="expiry">Son Kullanma</label>
                <input type="text" id="expiry" placeholder="AA/YY" maxlength="5" required>
            </div>
            <div class="input-group">
                <label for="cvv">CVV</label>
                <input type="password" id="cvv" placeholder="***" maxlength="3" required>
            </div>
        </div>

        <button type="submit" class="pay-btn">Ödemeyi Tamamla</button>
    </form>
</div>

</body>
</html>
